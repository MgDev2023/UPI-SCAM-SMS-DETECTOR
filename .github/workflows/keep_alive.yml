name: Keep App Alive

on:
  schedule:
    # Pings every 6 hours — prevents Streamlit free tier from sleeping
    - cron: "0 */6 * * *"
  workflow_dispatch:   # also allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging app to keep it alive..."
          curl -s -o /dev/null -w "HTTP status: %{http_code}" \
            https://upi-scam-sms-detector-ghgwrj6c5xdjatsqqmqsze.streamlit.app/
          echo " — done"
